  # ── GROUP: errors ──────────────────────────────────────────────
  # Eve (+18005550005) tests fault tolerance, edge cases, and malformed input
  # Eve NEVER creates triggers, so her phone is guaranteed to have no awaiting threads.

  - name: trigger_snooze_no_awaiting
    group: errors
    weight: 1
    description: "Snooze with no awaiting thread — graceful error, not a crash (Eve has no triggers)"
    # Eve's phone never creates triggers, so ack_status=awaiting is impossible for her.
    # This makes the 'No reminder' assertion deterministic regardless of Trigger Monitor timing.
    steps:
      - phone: "+18005550005"
        send: "snooze 30 minutes"
        expect_contains: "No reminder"

