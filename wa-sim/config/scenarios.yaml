# ──────────────────────────────────────────────────────────────────
# wa-sim scenario definitions
#
# Each scenario has:
#   name:        unique identifier
#   group:       phone group that owns this scenario (finance/reminders/threads/chat/errors)
#   weight:      relative pick probability within the group (default 1)
#   description: human-readable summary
#   steps:       ordered list of send/check steps
#
# Each step has:
#   phone:           the virtual phone number sending the message
#   send:            message text
#   expect_contains: (optional) substring that must appear in Alfred's reply
#   expect_none:     (optional, bool) assert Alfred does NOT reply (for silent errors)
#   no_wait:         (optional, bool) don't wait for a reply (fire-and-forget)
#   pause:           (optional, float) seconds to pause BEFORE this step
# ──────────────────────────────────────────────────────────────────

scenarios:

  # ── GROUP: finance ─────────────────────────────────────────────
