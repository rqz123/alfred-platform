services:
  ourcents:
    name: OurCents
    url: http://localhost:8001/api/ourcents      # overridden by OURCENTS_URL in Docker
    url_env: OURCENTS_URL
    api_key_env: OURCENTS_API_KEY
    description: Family expense tracker
    intents:
      - add_expense
      - add_income
      - get_balance
      - monthly_report
      - set_budget
      - process_receipt_image

  thread:
    name: Thread
    url: http://localhost:8002/api/thread      # overridden by THREAD_URL in Docker
    url_env: THREAD_URL
    api_key_env: THREAD_API_KEY
    description: Unified Thread lifecycle management
    intents:
      - add_thread
      - add_reminder
      - list_threads
      - list_reminders
      - search_threads
      - get_schedule
      - cancel_reminder
      - acknowledge_reminder
      - snooze_thread
      - dismiss_thread
      - thread_get
      - thread_delete
      - thread_link
      - thread_unlink
      - thread_links

  brain:
    name: Brain
    url: http://localhost:8003/api/brain      # overridden by BRAIN_URL in Docker
    url_env: BRAIN_URL
    api_key_env: BRAIN_API_KEY
    description: Family knowledge graph and weaving engine
    intents: []                               # Brain receives events, not skill dispatches
