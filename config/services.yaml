services:
  ourcents:
    name: OurCents
    url: http://localhost:8001/api/ourcents      # overridden by OURCENTS_URL in Docker
    url_env: OURCENTS_URL
    api_key_env: OURCENTS_API_KEY
    description: Family expense tracker
    intents:
      - add_expense
      - add_income
      - get_balance
      - monthly_report
      - set_budget
      - process_receipt_image

  nudge:
    name: Nudge
    url: http://localhost:8002/api/nudge      # overridden by NUDGE_URL in Docker
    url_env: NUDGE_URL
    api_key_env: NUDGE_API_KEY
    description: Reminder and schedule service
    intents:
      - add_reminder
      - list_reminders
      - get_schedule
      - cancel_reminder
      - add_note
      - list_notes
      - search_notes
