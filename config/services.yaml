services:
  ourcents:
    name: OurCents
    url: http://localhost:8001
    api_key_env: OURCENTS_API_KEY
    description: Family expense tracker
    intents:
      - add_expense
      - add_income
      - get_balance
      - monthly_report

  nudge:
    name: Nudge
    url: http://localhost:8002
    api_key_env: NUDGE_API_KEY
    description: Reminder and schedule service
    intents:
      - add_reminder
      - list_reminders
      - get_schedule
