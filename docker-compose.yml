version: '3.9'

networks:
  alfred-net:
    driver: bridge

services:
  bridge:
    build:
      context: bridge
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    networks:
      - alfred-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/sessions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/data
      - ./config:/config
    depends_on:
      bridge:
        condition: service_healthy
    networks:
      - alfred-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ourcents:
    build:
      context: .
      dockerfile: services/ourcents/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data:/data
    networks:
      - alfred-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nudge:
    build:
      context: .
      dockerfile: services/nudge/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - ./data:/data
    networks:
      - alfred-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
